<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chihuahua Sax XD</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  background:#000;
  font-family:Arial, Helvetica, sans-serif;
}

/* VIDEO DEL CHIHUAHUA */
#videoFondo{
  position:fixed;
  inset:0;
  width:100vw;
  height:100vh;
  object-fit:cover;
  z-index:1;
  background:#000;
}

/* BORDE RGB DE TODA LA PÁGINA */
.bordeRGB{
  position:fixed;
  inset:0;
  z-index:20;
  pointer-events:none;
  border:7px solid transparent;
  border-image:linear-gradient(
    90deg,
    red,
    orange,
    yellow,
    lime,
    cyan,
    blue,
    violet,
    red
  ) 1;
  animation:hue 3s linear infinite;
  box-shadow:
    inset 0 0 22px rgba(255,255,255,.25),
    0 0 22px rgba(255,0,255,.7);
}

@keyframes hue{
  from{filter:hue-rotate(0deg)}
  to{filter:hue-rotate(360deg)}
}

/* GATITO REBOTANDO */
#gato{
  position:fixed;
  width:130px;
  height:130px;
  object-fit:contain;
  z-index:10;
  pointer-events:none;
  user-select:none;
  filter:
    drop-shadow(0 0 8px white)
    drop-shadow(0 0 18px #ff00ff)
    drop-shadow(0 0 26px #00ffff);
  transform-origin:center;
}

/* BOTÓN PEQUEÑO SOLO SI EL NAVEGADOR BLOQUEA SONIDO */
#activarAudio{
  position:fixed;
  top:15px;
  right:15px;
  z-index:50;
  display:none;
  border:none;
  border-radius:999px;
  padding:12px 18px;
  background:linear-gradient(135deg,#ff004c,#ff9f00);
  color:white;
  font-weight:900;
  cursor:pointer;
  box-shadow:0 0 20px rgba(255,0,120,.8);
}

/* FLASH SUAVE CUANDO REBOTA */
#flash{
  position:fixed;
  inset:0;
  background:white;
  opacity:0;
  z-index:8;
  pointer-events:none;
}

#flash.activo{
  animation:flash .15s ease;
}

@keyframes flash{
  0%{opacity:0}
  45%{opacity:.20}
  100%{opacity:0}
}

/* TEXTO AL REBOTAR */
.bonk{
  position:fixed;
  z-index:15;
  color:white;
  font-size:34px;
  font-weight:900;
  pointer-events:none;
  text-shadow:
    0 0 10px red,
    0 0 20px yellow,
    0 0 30px cyan;
  animation:bonkAnim .55s ease forwards;
}

@keyframes bonkAnim{
  from{
    opacity:1;
    transform:scale(.6) rotate(-15deg);
  }
  to{
    opacity:0;
    transform:scale(1.8) rotate(15deg);
  }
}

@media(max-width:700px){
  #gato{
    width:95px;
    height:95px;
  }
}
</style>
</head>

<body>

<video id="videoFondo" autoplay loop playsinline>
  <source src="video.mp4" type="video/mp4">
</video>

<img id="gato" src="gato.webp" alt="gato rebotando">

<div class="bordeRGB"></div>
<div id="flash"></div>

<button id="activarAudio" onclick="activarSonido()">🔊 Activar sonido</button>

<script>
const video = document.getElementById("videoFondo");
const gato = document.getElementById("gato");
const botonAudio = document.getElementById("activarAudio");
const flash = document.getElementById("flash");

video.volume = 1;
video.muted = false;
video.currentTime = 14;

/* INTENTA INICIAR VIDEO CON SONIDO */
function iniciarVideo(){
  video.play().then(()=>{
    botonAudio.style.display = "none";
  }).catch(()=>{
    /*
      Los navegadores suelen bloquear autoplay con sonido.
      Entonces arranca silenciado y muestra botón para activar audio.
    */
    video.muted = true;
    video.play().catch(()=>{});
    botonAudio.style.display = "block";
  });
}

function activarSonido(){
  video.muted = false;
  video.volume = 1;
  video.play();
  botonAudio.style.display = "none";
}

/* FÍSICA TIPO DVD */
let x = 120;
let y = 120;
let vx = 5.6;
let vy = 4.4;
let rot = 0;
let escala = 1;

const palabras = ["BONK", "XD", "MIAU", "PUM", "🎷"];

function flashazo(){
  flash.classList.remove("activo");
  void flash.offsetWidth;
  flash.classList.add("activo");
}

function crearBonk(px,py){
  const b = document.createElement("div");
  b.className = "bonk";
  b.textContent = palabras[Math.floor(Math.random()*palabras.length)];
  b.style.left = px + "px";
  b.style.top = py + "px";
  document.body.appendChild(b);
  setTimeout(()=>b.remove(),600);
}

function animarGato(){
  const ancho = window.innerWidth;
  const alto = window.innerHeight;
  const gw = gato.offsetWidth;
  const gh = gato.offsetHeight;

  x += vx;
  y += vy;
  rot += vx * 1.6;

  let choque = false;

  if(x <= 7){
    x = 7;
    vx *= -1;
    choque = true;
  }

  if(x + gw >= ancho - 7){
    x = ancho - gw - 7;
    vx *= -1;
    choque = true;
  }

  if(y <= 7){
    y = 7;
    vy *= -1;
    choque = true;
  }

  if(y + gh >= alto - 7){
    y = alto - gh - 7;
    vy *= -1;
    choque = true;
  }

  if(choque){
    escala = 1.22;
    flashazo();
    crearBonk(x + gw/2, y + gh/2);

    vx += (Math.random() - .5) * .8;
    vy += (Math.random() - .5) * .8;

    vx = Math.max(Math.min(vx,9),-9);
    vy = Math.max(Math.min(vy,9),-9);
  }else{
    escala += (1 - escala) * .08;
  }

  gato.style.left = x + "px";
  gato.style.top = y + "px";
  gato.style.transform = `rotate(${rot}deg) scale(${escala})`;

  requestAnimationFrame(animarGato);
}

window.addEventListener("resize",()=>{
  x = Math.min(x, window.innerWidth - gato.offsetWidth - 7);
  y = Math.min(y, window.innerHeight - gato.offsetHeight - 7);
});

/* Cualquier clic también activa sonido si estaba muteado */
document.addEventListener("click",()=>{
  if(video.muted){
    activarSonido();
  }
});

iniciarVideo();
animarGato();
</script>

</body>
</html>
