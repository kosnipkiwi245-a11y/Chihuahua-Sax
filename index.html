<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sax Meme XD</title>
<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  background:#000;
  font-family:Arial, Helvetica, sans-serif;
}

#videoFondo{
  position:fixed;
  inset:0;
  width:100vw;
  height:100vh;
  object-fit:cover;
  z-index:1;
  filter:saturate(1.25) contrast(1.05);
}

.vineta{
  position:fixed;
  inset:0;
  z-index:2;
  pointer-events:none;
  background:
    radial-gradient(circle at center, transparent 45%, rgba(0,0,0,.45) 100%),
    linear-gradient(180deg, rgba(255,0,0,.08), transparent 25%, rgba(0,0,0,.2));
}

.scanlines{
  position:fixed;
  inset:0;
  z-index:3;
  pointer-events:none;
  background:repeating-linear-gradient(
    to bottom,
    rgba(255,255,255,.04) 0px,
    rgba(255,255,255,.04) 1px,
    transparent 1px,
    transparent 4px
  );
  opacity:.25;
  mix-blend-mode:overlay;
}

#caraGato{
  position:fixed;
  width:130px;
  height:130px;
  object-fit:contain;
  z-index:6;
  filter:
    drop-shadow(0 0 10px #fff)
    drop-shadow(0 0 20px #ff00ff)
    drop-shadow(0 0 30px #00ffff);
  user-select:none;
  pointer-events:none;
  transform-origin:center;
}

.titulo{
  position:fixed;
  top:22px;
  left:50%;
  transform:translateX(-50%);
  z-index:7;
  color:white;
  font-size:clamp(24px,4vw,56px);
  font-weight:900;
  letter-spacing:2px;
  text-align:center;
  text-shadow:
    0 0 8px #ff0000,
    0 0 18px #ff00ff,
    0 0 30px #00ffff;
  animation:glow 1.3s infinite alternate ease-in-out;
  pointer-events:none;
}

@keyframes glow{
  from{transform:translateX(-50%) scale(1); filter:hue-rotate(0deg)}
  to{transform:translateX(-50%) scale(1.04); filter:hue-rotate(50deg)}
}

.frase{
  position:fixed;
  bottom:18px;
  left:50%;
  transform:translateX(-50%);
  z-index:7;
  color:white;
  background:rgba(0,0,0,.55);
  border:2px solid rgba(255,255,255,.25);
  border-radius:999px;
  padding:12px 20px;
  font-weight:bold;
  text-align:center;
  backdrop-filter:blur(8px);
  text-shadow:0 0 10px black;
  pointer-events:none;
}

#pantallaInicio{
  position:fixed;
  inset:0;
  z-index:99;
  display:flex;
  align-items:center;
  justify-content:center;
  background:
    radial-gradient(circle at center, rgba(255,0,120,.32), transparent 35%),
    linear-gradient(135deg,#050005,#1b0000,#000);
  color:white;
  text-align:center;
}

.cardInicio{
  width:min(520px,92%);
  padding:34px;
  border-radius:28px;
  background:rgba(0,0,0,.72);
  border:2px solid rgba(255,255,255,.16);
  box-shadow:
    0 0 35px rgba(255,0,255,.45),
    0 0 65px rgba(0,255,255,.22);
  backdrop-filter:blur(10px);
}

.cardInicio img{
  width:150px;
  height:150px;
  object-fit:contain;
  filter:drop-shadow(0 0 18px #fff);
  animation:miniBounce 1s infinite alternate ease-in-out;
}

@keyframes miniBounce{
  from{transform:translateY(0) rotate(-6deg)}
  to{transform:translateY(-14px) rotate(6deg)}
}

.cardInicio h1{
  font-size:clamp(32px,7vw,62px);
  margin:12px 0;
  text-shadow:0 0 15px #ff00ff;
}

.cardInicio p{
  color:#ddd;
  margin-bottom:22px;
  line-height:1.5;
}

button{
  border:none;
  border-radius:16px;
  padding:16px 24px;
  background:linear-gradient(135deg,#ff004c,#ff9f00);
  color:white;
  font-weight:900;
  font-size:18px;
  cursor:pointer;
  box-shadow:0 0 25px rgba(255,0,100,.45);
  transition:.2s;
}

button:hover{
  transform:scale(1.06) rotate(-1deg);
  box-shadow:0 0 35px rgba(255,0,100,.8);
}

.flash{
  position:fixed;
  inset:0;
  z-index:5;
  background:white;
  opacity:0;
  pointer-events:none;
}

.flash.activo{
  animation:flashazo .18s ease;
}

@keyframes flashazo{
  0%{opacity:.0}
  40%{opacity:.28}
  100%{opacity:0}
}

.boom{
  position:fixed;
  z-index:8;
  color:white;
  font-weight:900;
  font-size:32px;
  text-shadow:0 0 12px #ff0000,0 0 25px #ffff00;
  pointer-events:none;
  animation:boom .55s ease forwards;
}

@keyframes boom{
  from{opacity:1;transform:scale(.6) rotate(-15deg)}
  to{opacity:0;transform:scale(1.8) rotate(15deg)}
}

@media(max-width:700px){
  #caraGato{
    width:95px;
    height:95px;
  }
  .frase{
    width:90%;
    border-radius:18px;
  }
}
</style>
</head>
<body>

<video id="videoFondo" loop playsinline>
  <source src="video.mp4" type="video/mp4">
  Tu navegador no soporta video HTML5.
</video>

<div class="vineta"></div>
<div class="scanlines"></div>
<div id="flash" class="flash"></div>

<div class="titulo">🎷 SAXOFÓN LEGENDARIO XD 🎷</div>
<div id="frase" class="frase">El gato rebotador ha entrado al servidor...</div>

<img id="caraGato" src="gato.webp" alt="gato meme">

<section id="pantallaInicio">
  <div class="cardInicio">
    <img src="gato.webp" alt="gato meme">
    <h1>XD MODE</h1>
    <p>
      Dale iniciar para activar el saxofón con sonido y liberar al gato rebotador.
      <br>Advertencia: puede causar risa extrema.
    </p>
    <button onclick="iniciarMeme()">INICIAR MEME</button>
  </div>
</section>

<script>
const video = document.getElementById("videoFondo");
const gato = document.getElementById("caraGato");
const inicio = document.getElementById("pantallaInicio");
const flash = document.getElementById("flash");
const frase = document.getElementById("frase");

let x = 120;
let y = 120;
let vx = 5.8;
let vy = 4.6;
let rotacion = 0;
let escala = 1;
let iniciado = false;

const frases = [
  "MIAU SAXOFÓNICO ACTIVADO 🎷",
  "El gato no paga renta, solo rebota XD",
  "Modo Chihuahua del saxofón: ON",
  "Este sitio tiene más flow que Steam",
  "Rebote certificado por la NASA",
  "El gato vio el futuro y era puro sax",
  "PUM, contra la pared jsjs",
  "No hay escapatoria del saxofón",
  "Miau.exe dejó de responder",
  "DarkLoader Meme Edition"
];

function iniciarMeme(){
  inicio.style.display = "none";
  iniciado = true;

  video.volume = 1;
  video.muted = false;
  video.currentTime = 14;

  video.play().catch(() => {
    alert("Tu navegador bloqueó el autoplay. Toca la pantalla otra vez.");
  });

  animar();
}

function fraseRandom(){
  frase.textContent = frases[Math.floor(Math.random() * frases.length)];
}

function boomTexto(px, py){
  const boom = document.createElement("div");
  boom.className = "boom";
  boom.textContent = ["PUM", "XD", "MIAU", "BONK", "🎷"][Math.floor(Math.random()*5)];
  boom.style.left = px + "px";
  boom.style.top = py + "px";
  document.body.appendChild(boom);
  setTimeout(() => boom.remove(), 600);
}

function flashazo(){
  flash.classList.remove("activo");
  void flash.offsetWidth;
  flash.classList.add("activo");
}

function animar(){
  if(!iniciado) return;

  const ancho = window.innerWidth;
  const alto = window.innerHeight;
  const gw = gato.offsetWidth;
  const gh = gato.offsetHeight;

  x += vx;
  y += vy;
  rotacion += vx * 1.8;

  let choque = false;

  if(x <= 0){
    x = 0;
    vx *= -1;
    choque = true;
  }

  if(x + gw >= ancho){
    x = ancho - gw;
    vx *= -1;
    choque = true;
  }

  if(y <= 0){
    y = 0;
    vy *= -1;
    choque = true;
  }

  if(y + gh >= alto){
    y = alto - gh;
    vy *= -1;
    choque = true;
  }

  if(choque){
    escala = 1.25;
    fraseRandom();
    flashazo();
    boomTexto(x + gw / 2, y + gh / 2);

    vx += (Math.random() - 0.5) * 1.2;
    vy += (Math.random() - 0.5) * 1.2;

    vx = Math.max(Math.min(vx, 10), -10);
    vy = Math.max(Math.min(vy, 10), -10);
  }else{
    escala += (1 - escala) * 0.08;
  }

  gato.style.left = x + "px";
  gato.style.top = y + "px";
  gato.style.transform = `rotate(${rotacion}deg) scale(${escala})`;

  requestAnimationFrame(animar);
}

window.addEventListener("resize", () => {
  x = Math.min(x, window.innerWidth - gato.offsetWidth);
  y = Math.min(y, window.innerHeight - gato.offsetHeight);
});

document.addEventListener("keydown", (e) => {
  if(e.code === "Space"){
    if(video.paused){
      video.play();
    }else{
      video.pause();
    }
  }

  if(e.key.toLowerCase() === "r"){
    x = Math.random() * (window.innerWidth - gato.offsetWidth);
    y = Math.random() * (window.innerHeight - gato.offsetHeight);
    vx = 5 + Math.random() * 4;
    vy = 4 + Math.random() * 4;
    fraseRandom();
  }
});
</script>

</body>
</html>
